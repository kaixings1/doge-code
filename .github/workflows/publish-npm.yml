name: Publish Fork Package To npm

on:
  workflow_run:
    workflows:
      - Sync Fork From Upstream
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-fork-package
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare npm package
        env:
          NPM_PACKAGE_NAME: ${{ vars.NPM_PACKAGE_NAME }}
          NPM_BIN_NAME: ${{ vars.NPM_BIN_NAME }}
          PUBLISH_REPOSITORY_URL: ${{ vars.PUBLISH_REPOSITORY_URL }}
        run: node ./scripts/release/prepare-release-package.mjs

      - name: Check published version
        id: version_check
        working-directory: ./dist/npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve publish auth mode
        id: publish_auth
        if: steps.version_check.outputs.published == 'false'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
          else
            echo "mode=trusted" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package with npm token
        if: steps.version_check.outputs.published == 'false' && steps.publish_auth.outputs.mode == 'token'
        working-directory: ./dist/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag latest

      - name: Publish package with trusted publishing
        if: steps.version_check.outputs.published == 'false' && steps.publish_auth.outputs.mode == 'trusted'
        working-directory: ./dist/npm
        run: npm publish --access public --provenance --tag latest
